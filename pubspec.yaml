name: flutter_notes_app
description: A beautiful notes app with dynamic columns, Firebase & Provider

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.4
  firebase_auth: ^5.3.1

  # Connectivity
  connectivity_plus: ^6.0.3

  # State Management
  provider: ^6.1.1

  # UI
  google_fonts: ^6.1.0
  flutter_animate: ^4.5.0
  gap: ^3.0.1
  iconsax: ^0.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true